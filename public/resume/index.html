<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAO | 把 AI 工具链变成交付能力</title>
    <link rel="stylesheet" href="shared/styles.css">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                linear-gradient(90deg, rgba(5, 9, 20, 0.92), rgba(5, 9, 20, 0.38)),
                url("image/hero-bg.avif") center/cover;
        }

        .entry {
            width: min(960px, calc(100% - 40px));
            padding: 64px 0;
        }

        .entry-panel {
            max-width: 680px;
            padding: clamp(24px, 4vw, 44px);
        }

        .entry h1 {
            max-width: 460px;
            margin-bottom: 18px;
            line-height: 1.12;
            font-weight: 800;
            letter-spacing: -0.035em;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
        }

        .entry p {
            max-width: 620px;
            margin-bottom: 26px;
            color: var(--text-secondary);
            font-size: clamp(0.96rem, 1.7vw, 1.08rem);
        }

        .entry-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <main class="entry">
        <section class="entry-panel glass-card reveal">
            <div class="entry-meta">
                <span class="tag">AI Vibe Coding</span>
                <span class="tag">C# 上位机</span>
                <span class="tag">工业自动化</span>
                <span class="tag">PMP</span>
            </div>
            <span class="eyebrow">AI 工具链交付能力</span>
            <h1>把工业经验变成 AI 交付能力，让想法更快落地。</h1>
            <p>从 PLC/HMI 和 C# 上位机出发，我用 AI 编程工具、多模型接入和自动化工作流，把模糊需求变成可运行、可部署的软件结果。</p>
            <div class="button-row">
                <a href="home/home.html" class="btn btn-primary">了解更多</a>
                <a href="case/case.html" class="btn">查看项目</a>
            </div>
        </section>
    </main>
    <script src="shared/script.js"></script>
</body>
</html>
