<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAO | AI 工具链与工业软件作品集</title>
    <link rel="stylesheet" href="shared/styles.css">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                linear-gradient(90deg, rgba(5, 9, 20, 0.92), rgba(5, 9, 20, 0.38)),
                url("https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=1800&q=80") center/cover;
        }

        .entry {
            width: min(960px, calc(100% - 40px));
            padding: 64px 0;
        }

        .entry-panel {
            max-width: 680px;
            padding: clamp(24px, 4vw, 44px);
        }

        .entry h1 {
            margin-bottom: 18px;
            font-size: clamp(1.95rem, 4vw, 3.5rem);
            line-height: 1.12;
            font-weight: 800;
            letter-spacing: -0.035em;
        }

        .entry p {
            max-width: 620px;
            margin-bottom: 26px;
            color: var(--text-secondary);
            font-size: clamp(0.96rem, 1.7vw, 1.08rem);
        }

        .entry-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <main class="entry">
        <section class="entry-panel glass-card reveal">
            <div class="entry-meta">
                <span class="tag">PLC / HMI</span>
                <span class="tag">C# 上位机</span>
                <span class="tag">PMP</span>
            </div>
            <span class="eyebrow">AI Vibe Coding Portfolio</span>
            <h1>用 AI 工具链，把想法更快变成软件。</h1>
            <p>我从工业自动化和 C# 上位机开发出发，正在把 AI 编程工具、多模型接入和自动化工作流融入实际项目交付。</p>
            <div class="button-row">
                <a href="home/home.html" class="btn btn-primary">进入网站</a>
                <a href="case/case.html" class="btn">查看项目</a>
            </div>
        </section>
    </main>
    <script src="shared/script.js"></script>
</body>
</html>
